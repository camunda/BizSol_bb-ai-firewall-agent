name: Test Pull Request

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: mvn clean verify

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "## Test Results" > coverage-report.md
          echo "" >> coverage-report.md
          
          # Check if JaCoCo report exists
          if [ -f "target/site/jacoco/index.html" ]; then
            echo "### Code Coverage (JaCoCo)" >> coverage-report.md
            
            # Extract coverage percentage from JaCoCo report
            COVERAGE=$(grep -oP '(?<=Total<\/td><td class="bar">)[^%]+(?=%)' target/site/jacoco/index.html || echo "N/A")
            echo "- **Line Coverage:** ${COVERAGE}%" >> coverage-report.md
            echo "" >> coverage-report.md
          fi
          
          # Check for test results
          if [ -d "target/surefire-reports" ]; then
            TESTS_TOTAL=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "tests=" {} \; | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            TESTS_FAILED=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "failures=" {} \; | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            TESTS_ERRORS=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "errors=" {} \; | sed 's/.*errors="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            TESTS_SKIPPED=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "skipped=" {} \; | sed 's/.*skipped="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            
            echo "### Unit Test Results" >> coverage-report.md
            echo "- **Total Tests:** ${TESTS_TOTAL:-0}" >> coverage-report.md
            echo "- **Passed:** $((${TESTS_TOTAL:-0} - ${TESTS_FAILED:-0} - ${TESTS_ERRORS:-0} - ${TESTS_SKIPPED:-0}))" >> coverage-report.md
            echo "- **Failed:** ${TESTS_FAILED:-0}" >> coverage-report.md
            echo "- **Errors:** ${TESTS_ERRORS:-0}" >> coverage-report.md
            echo "- **Skipped:** ${TESTS_SKIPPED:-0}" >> coverage-report.md
            echo "" >> coverage-report.md
          fi
          
          # Check for integration test results
          if [ -d "target/failsafe-reports" ]; then
            IT_TESTS_TOTAL=$(find target/failsafe-reports -name "TEST-*.xml" -exec grep -h "tests=" {} \; | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            IT_TESTS_FAILED=$(find target/failsafe-reports -name "TEST-*.xml" -exec grep -h "failures=" {} \; | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            IT_TESTS_ERRORS=$(find target/failsafe-reports -name "TEST-*.xml" -exec grep -h "errors=" {} \; | sed 's/.*errors="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            IT_TESTS_SKIPPED=$(find target/failsafe-reports -name "TEST-*.xml" -exec grep -h "skipped=" {} \; | sed 's/.*skipped="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
            
            echo "### Integration Test Results" >> coverage-report.md
            echo "- **Total Tests:** ${IT_TESTS_TOTAL:-0}" >> coverage-report.md
            echo "- **Passed:** $((${IT_TESTS_TOTAL:-0} - ${IT_TESTS_FAILED:-0} - ${IT_TESTS_ERRORS:-0} - ${IT_TESTS_SKIPPED:-0}))" >> coverage-report.md
            echo "- **Failed:** ${IT_TESTS_FAILED:-0}" >> coverage-report.md
            echo "- **Errors:** ${IT_TESTS_ERRORS:-0}" >> coverage-report.md
            echo "- **Skipped:** ${IT_TESTS_SKIPPED:-0}" >> coverage-report.md
            echo "" >> coverage-report.md
          fi

      - name: Comment PR with Coverage
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let coverageReport = 'Coverage report not available';
            
            try {
              if (fs.existsSync('coverage-report.md')) {
                coverageReport = fs.readFileSync('coverage-report.md', 'utf8');
              }
            } catch (error) {
              console.error('Error reading coverage report:', error);
            }
            
            const body = `${coverageReport}\n\n---\n*Automated coverage report generated by GitHub Actions*`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Automated coverage report')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 30

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/
            target/coverage-report/
          retention-days: 30

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: |
            target/surefire-reports/TEST-*.xml
            target/failsafe-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: true
