name: Test Pull Request

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: mvn clean verify

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "## Test Results" > coverage-report.md
          echo "" >> coverage-report.md
          
          # Check if JaCoCo XML report exists and parse it using xmllint
          if [ -f "target/site/jacoco/jacoco.xml" ]; then
            echo "### Code Coverage (JaCoCo)" >> coverage-report.md
            
            # Extract coverage metrics from JaCoCo XML report using xmllint
            if command -v xmllint &> /dev/null; then
              LINE_MISSED=$(xmllint --xpath "sum(//counter[@type='LINE']/@missed)" target/site/jacoco/jacoco.xml 2>/dev/null || echo "0")
              LINE_COVERED=$(xmllint --xpath "sum(//counter[@type='LINE']/@covered)" target/site/jacoco/jacoco.xml 2>/dev/null || echo "0")
              
              if [ "$LINE_COVERED" != "0" ] || [ "$LINE_MISSED" != "0" ]; then
                TOTAL_LINES=$((LINE_MISSED + LINE_COVERED))
                COVERAGE_PCT=$(awk -v covered="$LINE_COVERED" -v total="$TOTAL_LINES" 'BEGIN {printf "%.2f", (covered/total)*100}')
                echo "- **Line Coverage:** ${COVERAGE_PCT}% (${LINE_COVERED}/${TOTAL_LINES})" >> coverage-report.md
              else
                echo "- **Line Coverage:** N/A" >> coverage-report.md
              fi
            else
              echo "- **Line Coverage:** N/A (xmllint not available)" >> coverage-report.md
            fi
            echo "" >> coverage-report.md
          fi
          
          # Parse test results using xmllint for more robust XML handling
          parse_test_results() {
            local test_dir=$1
            local test_type=$2
            
            if [ ! -d "$test_dir" ]; then
              return
            fi
            
            local total=0 failed=0 errors=0 skipped=0
            
            for xml_file in "$test_dir"/TEST-*.xml; do
              if [ -f "$xml_file" ]; then
                if command -v xmllint &> /dev/null; then
                  t=$(xmllint --xpath "string(/testsuite/@tests)" "$xml_file" 2>/dev/null || echo "0")
                  f=$(xmllint --xpath "string(/testsuite/@failures)" "$xml_file" 2>/dev/null || echo "0")
                  e=$(xmllint --xpath "string(/testsuite/@errors)" "$xml_file" 2>/dev/null || echo "0")
                  s=$(xmllint --xpath "string(/testsuite/@skipped)" "$xml_file" 2>/dev/null || echo "0")
                else
                  # Fallback to grep if xmllint is not available
                  t=$(grep -oP 'tests="\K[0-9]+' "$xml_file" 2>/dev/null || echo "0")
                  f=$(grep -oP 'failures="\K[0-9]+' "$xml_file" 2>/dev/null || echo "0")
                  e=$(grep -oP 'errors="\K[0-9]+' "$xml_file" 2>/dev/null || echo "0")
                  s=$(grep -oP 'skipped="\K[0-9]+' "$xml_file" 2>/dev/null || echo "0")
                fi
                
                total=$((total + ${t:-0}))
                failed=$((failed + ${f:-0}))
                errors=$((errors + ${e:-0}))
                skipped=$((skipped + ${s:-0}))
              fi
            done
            
            if [ $total -gt 0 ]; then
              local passed=$((total - failed - errors - skipped))
              echo "### ${test_type} Test Results" >> coverage-report.md
              echo "- **Total Tests:** $total" >> coverage-report.md
              echo "- **Passed:** $passed" >> coverage-report.md
              echo "- **Failed:** $failed" >> coverage-report.md
              echo "- **Errors:** $errors" >> coverage-report.md
              echo "- **Skipped:** $skipped" >> coverage-report.md
              echo "" >> coverage-report.md
            fi
          }
          
          # Parse unit test results
          parse_test_results "target/surefire-reports" "Unit"
          
          # Parse integration test results
          parse_test_results "target/failsafe-reports" "Integration"

      - name: Comment PR with Coverage
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let coverageReport = 'Coverage report not available';
            
            try {
              if (fs.existsSync('coverage-report.md')) {
                coverageReport = fs.readFileSync('coverage-report.md', 'utf8');
              }
            } catch (error) {
              console.error('Error reading coverage report:', error);
            }
            
            const body = `${coverageReport}\n\n---\n*Automated coverage report generated by GitHub Actions*`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Automated coverage report')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 30

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/
            target/coverage-report/
          retention-days: 30

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: |
            target/surefire-reports/TEST-*.xml
            target/failsafe-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: true
