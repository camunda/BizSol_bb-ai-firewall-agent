name: LLM Integration Tests

on:
  pull_request:
    branches:
      - main

jobs:
  llm-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read

    strategy:
      fail-fast: false
      matrix:
        camunda-version:
          - name: '8.8'
            docker-tag: '8.8-SNAPSHOT'
          - name: '8.9-alpha'
            docker-tag: '8.9-SNAPSHOT'

    name: LLM tests (Camunda ${{ matrix.camunda-version.name }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run LLM integration tests (Camunda ${{ matrix.camunda-version.name }})
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          mvn failsafe:integration-test failsafe:verify -B -q
          -Dcamunda.process-test.camunda-docker-image-version=${{ matrix.camunda-version.docker-tag }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-test-reports-${{ matrix.camunda-version.name }}
          path: target/failsafe-reports/
          retention-days: 7
